<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffebills</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4b3621;
            --accent-color: #c0a080;
            --bg-color: #fdf5e6;
            --white: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#d2b48c 0.5px, transparent 0.5px);
            background-size: 20px 20px; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .cafe-card {
            background: var(--white);
            max-width: 400px;
            width: 90%;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(75, 54, 33, 0.15);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .cafe-card:hover {
            transform: translateY(-10px);
        }

        .hero-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .content {
            padding: 30px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-color);
            margin: 0 0 10px 0;
            font-size: 2rem;
        }

        p {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        #tanggal {
            font-size: 0.8rem;
            color: var(--accent-color);
            background: #fcf8f3;
            padding: 10px;
            border-radius: 12px;
            border: 1px dashed var(--accent-color);
            margin-bottom: 25px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 15px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }

        button:hover {
            background-color: var(--accent-color);
            box-shadow: 0 5px 15px rgba(192, 160, 128, 0.4);
        }

        button.secondary {
            background-color: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
        }

        button.secondary:hover {
            background-color: var(--primary-color);
            color: white;
        }
    </style>
</head>
<body>

    <div class="cafe-card">
        <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&q=80&w=600" alt="Coffee Shop" class="hero-image">

        <div class="content">
            <h1>Coffebills</h1>
            <p>Ruang tenang untuk meracik kode dan menikmati aroma biji kopi pilihan terbaik.</p>

            <div id="tanggal">Menghubungkan ke waktu server...</div>

            <div class="button-group">
                <button onclick="tampil()">Cek Promo</button>
                <button class="secondary" onclick="show()">Barista Info</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
