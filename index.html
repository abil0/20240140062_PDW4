<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffebills</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4b3621;
            --accent-color: #c0a080;
            --bg-color: #fdf5e6;
            --white: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#d2b48c 0.5px, transparent 0.5px);
            background-size: 20px 20px; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .cafe-card {
            background: var(--white);
            max-width: 400px;
            width: 90%;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(75, 54, 33, 0.15);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .cafe-card:hover {
            transform: translateY(-10px);
        }

        .hero-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .content {
            padding: 30px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-color);
            margin: 0 0 10px 0;
            font-size: 2rem;
        }

        p {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        #tanggal {
            font-size: 0.8rem;
            color: var(--accent-color);
            background: #fcf8f3;
            padding: 10px;
            border-radius: 12px;
            border: 1px dashed var(--accent-color);
            margin-bottom: 25px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 15px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }

        button:hover {
            background-color: var(--accent-color);
            box-shadow: 0 5px 15px rgba(192, 160, 128, 0.4);
        }

        button.secondary {
            background-color: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
        }

        button.secondary:hover {
            background-color: var(--primary-color);
            color: white;
        }
    </style>
</head>
<body>

    <div class="cafe-card">
        <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&q=80&w=600" alt="Coffee Shop" class="hero-image">

        <div class="content">
            <h1>Coffebills</h1>
            <p>Ruang tenang untuk menikmati aroma biji kopi pilihan terbaik.</p>

            <div id="tanggal">Menghubungkan ke waktu server...</div>

            <div class="button-group">
                <button onclick="tampil()">Cek Promo</button>
                <button class="secondary" onclick="show()">Barista Info</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html><!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffebills - Premium Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #3d2b1f;
            --accent-color: #d4a373;
            --bg-color: #fefae0;
            --text-muted: #6b705c;
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            /* Background pattern yang lebih elegan */
            background-image: radial-gradient(#bc6c25 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .cafe-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            max-width: 420px;
            width: 100%;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(61, 43, 31, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cafe-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 35px 60px -15px rgba(61, 43, 31, 0.3);
        }

        .image-container {
            position: relative;
            height: 280px;
            overflow: hidden;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .cafe-card:hover .hero-image {
            transform: scale(1.1);
        }

        /* Overlay gradasi pada gambar */
        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
        }

        .content {
            padding: 40px 30px;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-color);
            font-size: 2.8rem;
            margin-bottom: 8px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 20px;
            display: block;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        #tanggal {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary-color);
            background: rgba(212, 163, 115, 0.15);
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: inline-block;
            width: 100%;
        }

        .button-group {
            display: flex;
            gap: 15px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 20px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            box-shadow: 0 4px 15px rgba(61, 43, 31, 0.2);
        }

        button:hover {
            background-color: var(--accent-color);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(212, 163, 115, 0.4);
        }

        button.secondary {
            background-color: white;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            box-shadow: none;
        }

        button.secondary:hover {
            background-color: var(--primary-color);
            color: white;
        }

        /* Animasi masuk */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cafe-card {
            animation: fadeInUp 1s ease-out;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="cafe-card">
            <div class="image-container">
                <img src="https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?auto=format&fit=crop&q=80&w=800" alt="Premium Coffee" class="hero-image">
                <div class="image-overlay"></div>
            </div>

            <div class="content">
                <span class="subtitle">Brewed with Love</span>
                <h1>Coffebills</h1>
                <p>Temukan harmoni dalam setiap tetesan kopi pilihan untuk menemani setiap baris kode yang Anda susun.</p>

                <div id="tanggal">Memuat waktu operasional...</div>

                <div class="button-group">
                    <button onclick="tampil()">Claim Promo</button>
                    <button class="secondary" onclick="show()">Barista Info</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
